<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My Reveal.js Presentation</title>
    <!-- Basic Reveal.js Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.css">
    <!-- NON-DEFAULT THEME: Using "dracula" instead of the default "black" -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/dracula.css" id="theme">
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <!-- 
              MARKDOWN CONFIGURATION:
              data-separator="^\n---\n$" creates Horizontal slides
              data-separator-vertical="^\n--\n$" creates Vertical slides 
            -->
            <section data-markdown data-separator="^\n---\n$" data-separator-vertical="^\n--\n$">
                <textarea data-template>
## Slide 1: Introduction
Welcome to my presentation on Generative AI.
*(Swipe left/right or use Left/Right arrows)*

---

## Slide 2: The Power of AI
Here is a visual representation of artificial intelligence.

<!-- IMAGE INCLUSION -->
![AI Concept](https://picsum.photos/600/300)

---

## Slide 3: Deep Dive (Start Vertical)
This slide contains vertical navigation. 
*(Swipe up/down or press the Down arrow to see more)*

--

## Slide 4: Vertical Content 1
You are now navigating **vertically**. 
Reveal.js makes it easy to organize sub-topics under a main horizontal slide.

--

## Slide 5: Vertical Content 2
Still navigating vertically! Here is a bulleted list:
* Point A
* Point B
* Point C

---

## Slide 6: Conclusion
We are back to horizontal navigation. 
Thank you for watching!
                </textarea>
            </section>
        </div>
    </div>

    <!-- Load Reveal.js and the Markdown Plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/plugin/markdown/markdown.js"></script>
    <script>
        // Initialize Reveal.js and activate the Markdown plugin
        Reveal.initialize({
            hash: true, // Adds slide numbers to the URL
            plugins: [ RevealMarkdown ]
        });
    </script>
</body>
</html>
